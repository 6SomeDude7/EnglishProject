<!DOCTYPE html>
<html lang="en">

<head>
  <title>Connections</title>
  <link rel="stylesheet" href="connections.css">
  <link rel="stylesheet" href="trasformations.css">
  <link rel="stylesheet" href="../General/general.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>

<body>
  
  <div>
    <a class="fBtn" href="../index.html">Back</a>
  </div>



  <div class="mainDiv">
    <p class="rulesP">You know the rules and so do I! *puzzle saves after complete*</p>
    <div class="gameBoard">
      <div class="SolvedDiv">
        <div class="solvedGroup" data-group="0">
          <h3>DOGS</h3>
          <p>A, B, C, D</p>
        </div>
        <div class="solvedGroup" data-group="1">
          <h3>THINGS THAT STRESS PEOPLE</h3>
          <p>W, X, Y, Z</p>
        </div>
        <div class="solvedGroup" data-group="2">
          <h3>WAY PEOPLE REALEAVE STRESS</h3>
          <p>1, 2, 3, 4</p>
        </div>
        <div class="solvedGroup" data-group="3">
          <h3>???</h3>
          <p>PAIN, MORE PAIN, EVEN MORE PAIN, MAX PAIN</p>
        </div>
      </div>
      <div>
        <div class="categorysDiv">
          <!-- 1st category buttons,   
  ["SLEEP", "MUSIC", "BOWLING", "FRIENDS"],
  ["COFFEE", "OVERTIME", "DEADLINE", "EMAILS"],
  ["PHONE", "SCROLL", "COMPARE", "NOTIFICATIONS"],
  ["BREATHE", "WALK", "QUIET", "PAUSE"]-->

          <button class="tile">
            SLEEP
          </button>
          <button class="tile">
            MUSIC
          </button>
          <button class="tile">
            BOWLING
          </button>
          <button class="tile">
            FRIENDS
          </button>
          <!-- 2nd category buttons -->
          <button class="tile">
            COFFEE
          </button>
          <button class="tile">
            OVERTIME
          </button>
          <button class="tile">
            DEADLINE
          </button>
          <button class="tile">
            EMAILS
          </button>
          <!-- 3rd category buttons -->
          <button class="tile">
            PHONE
          </button>
          <button class="tile">
            SCROLL
          </button>
          <button class="tile">
            COMPARE
          </button>
          <button class="tile">
            NOTIFICATIONS
          </button>
          <!-- 4th category buttons -->
          <button class="tile">
            BREATHE
          </button>
          <button class="tile">
            WALK
          </button>
          <button class="tile">
            QUIET
          </button>
          <button class="tile">
            PAUSE
          </button>
        </div>
      </div>
        <div class="mistakesDiv">
          <p class="mistakesP">

          </p>
        </div>
        <div class="submitButtonDiv">
          <button class="shuffleButton" data-group="0">Shuffle</button>
          <button class="shuffleButton" data-group="1">Reset</button>
          <button class="submitButton">Submit</button>
          
        </div>
      </div>
    </div>
    <div class="notSolvedDiv">
    </div>
    <div class="oneAwayPopup" id="oneAwayPopup">
      One away!
    </div>
    <div class="winPopup" id="winPopup">
      <div class="winBox">
        <h2>Puzzle Complete</h2>
        <p>You finished the puzzle.</p>
        <button id="closeWin">Close</button>
      </div>
    </div>
  </div>
  
  <script src="connections.js"></script>
</body>
</html>
